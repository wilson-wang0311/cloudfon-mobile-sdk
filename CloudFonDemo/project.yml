name: CloudFonDemo
options:
  bundleIdPrefix: com.cloudfon
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CloudFonDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cloudfon.demo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postCompileScripts: []
